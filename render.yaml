services:
  - type: web
    name: medisync-backend
    env: node
    rootDir: backend
    plan: starter
    autoDeploy: true
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: medisync-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: REFRESH_SECRET
        generateValue: true
      - key: REFRESH_EXPIRES_IN
        value: 7d
      - key: EMAIL_SERVICE
        value: gmail
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: EMAIL_FROM
        value: MediSync <noreply@medisync.com>
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false

  - type: web
    name: medisync-frontend
    env: node
    rootDir: frontend
    plan: starter
    autoDeploy: true
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_BACKEND_URL
        sync: false
      - key: NEXT_PUBLIC_LOG_LEVEL
        value: info
      - key: OPENAI_API_KEY
        sync: false

  - type: redis
    name: medisync-redis
    plan: starter
    ipAllowList: []
